<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟时钟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            width: 200px;
            height: 200px;
            overflow: visible;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .clock {
            width: 180px;
            height: 180px;
            border: 4px solid #333;
            border-radius: 50%;
            position: relative;
            background: white;
        }
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
        }
        .hour {
            width: 4px;
            height: 50px;
            background: #333;
            margin-left: -2px;
        }
        .minute {
            width: 3px;
            height: 70px;
            background: #666;
            margin-left: -1.5px;
        }
        .second {
            width: 2px;
            height: 80px;
            background: #e74c3c;
            margin-left: -1px;
        }
        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .number {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="clock">
        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>
        <div class="center"></div>
        <div class="number" style="top: 5px; left: 50%; transform: translateX(-50%);">12</div>
        <div class="number" style="top: 50%; right: 5px; transform: translateY(-50%);">3</div>
        <div class="number" style="bottom: 5px; left: 50%; transform: translateX(-50%);">6</div>
        <div class="number" style="top: 50%; left: 5px; transform: translateY(-50%);">9</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hour = now.getHours() % 12;
            const minute = now.getMinutes();
            const second = now.getSeconds();

            const hourDeg = (hour * 30) + (minute * 0.5);
            const minuteDeg = minute * 6;
            const secondDeg = second * 6;

            document.getElementById('hour').style.transform = `rotate(${hourDeg}deg)`;
            document.getElementById('minute').style.transform = `rotate(${minuteDeg}deg)`;
            document.getElementById('second').style.transform = `rotate(${secondDeg}deg)`;
        }

        updateClock();
        setInterval(updateClock, 1000);

        // 响应父页面的尺寸请求
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'requestSize') {
                const width = document.body.scrollWidth || document.body.offsetWidth;
                const height = document.body.scrollHeight || document.body.offsetHeight;
                window.parent.postMessage({
                    type: 'reportSize',
                    width: width,
                    height: height
                }, '*');
            }
        });
    </script>
</body>
</html>
